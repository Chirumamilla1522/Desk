<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>Sign in — Career-Ops Desk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Source+Sans+3:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=2026-04-14-auth-desk-ui" />
  </head>
  <body class="auth-page">
    <div class="auth-shell">
      <header class="auth-brand">
        <div class="auth-brand-mark" aria-hidden="true">◇</div>
        <div class="auth-brand-text">
          <p class="auth-product">Desk</p>
          <p class="auth-tagline">Career-Ops workspace</p>
        </div>
      </header>

      <main class="auth-card-panel">
        <h2>Sign in</h2>
        <p id="auth-lead" class="auth-lead">Connecting…</p>
        <form id="auth-form" hidden>
          <div class="auth-field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="email" required />
          </div>
          <div class="auth-field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required />
          </div>
          <div class="auth-actions">
            <button type="submit" class="btn primary" id="btn-signin">Sign in</button>
            <a class="btn ghost" href="/signup" id="link-signup">Create account</a>
          </div>
        </form>
        <p class="auth-desk-msg" id="auth-msg" hidden role="alert"></p>
        <footer class="auth-footer">
          <a href="/">← Back to Desk</a>
        </footer>
      </main>
    </div>
    <script type="module">
      (async function authInit() {
        const lead = document.getElementById('auth-lead');
        const form = document.getElementById('auth-form');
        const msg = document.getElementById('auth-msg');
        if (!lead || !form || !msg) return;

        function safeNextHref() {
          const raw = new URLSearchParams(window.location.search).get('next');
          if (!raw || !raw.startsWith('/')) return '/';
          if (raw.startsWith('//')) return '/';
          return raw;
        }

        function showErr(t) {
          msg.hidden = false;
          msg.classList.add('err');
          msg.textContent = t;
        }

        try {
          const res = await fetch('/api/bootstrap', { credentials: 'same-origin' });
          const raw = await res.text();
          let b = {};
          try {
            b = raw ? JSON.parse(raw) : {};
          } catch {
            throw new Error(`Could not read server response (${res.status}). Is the Desk running?`);
          }
          if (!res.ok) {
            lead.textContent = `The server returned an error (${res.status}). From the repo root, run npm run web, then reload this page.`;
            return;
          }
          if (!b.cloud || !b.supabase?.url || !b.supabase?.anonKey) {
            lead.textContent =
              'Cloud sign-in is not enabled. Add CAREER_OPS_CLOUD=1, SUPABASE_URL, and SUPABASE_ANON_KEY to the .env file next to package.json, restart the server, and reload.';
            return;
          }
          lead.textContent = 'Use the email and password for your Desk account. Your session is stored in a secure cookie.';
          form.hidden = false;
          const su = document.getElementById('link-signup');
          if (su) su.href = '/signup' + window.location.search;
        } catch (e) {
          lead.textContent =
            (e.message || String(e)) +
            ' Open this page from the same address as your Desk (for example http://127.0.0.1:3847/auth.html).';
          return;
        }

        form.addEventListener('submit', async (ev) => {
          ev.preventDefault();
          msg.hidden = true;
          msg.classList.remove('err');
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;
          const r = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ email, password }),
          });
          const data = await r.json().catch(() => ({}));
          if (!r.ok) {
            showErr(data.error || r.statusText || 'Sign-in failed');
            return;
          }
          window.location.href = safeNextHref();
        });
      })();
    </script>
  </body>
</html>
